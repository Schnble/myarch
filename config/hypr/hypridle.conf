general {
    lock_cmd = myarch-system-lock                         # lock screen and 1password
    before_sleep_cmd = MYARCH_LOCK_ONLY=true myarch-system-lock    # lock before suspend without scheduling display off.
    after_sleep_cmd = sleep 1 && myarch-system-wake                 # delay for PAM readiness, then turn on display.
    inhibit_sleep = 3                                      # wait until screen is locked
}

# Lock system after 5 minutes
listener {
    timeout = 300
    on-timeout = myarch-system-lock
    on-resume = myarch-system-wake
}
